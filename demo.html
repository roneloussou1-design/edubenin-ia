
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:var(--font-sans)}
:root{--blue:#1a4fa0;--navy:#0d2f6b;--sky:#e6f1fb;--gold:#f5a623;--green:#27ae60;--red:#e74c3c;--amber:#f39c12}
.app{min-height:700px;background:var(--color-background-tertiary)}
.topbar{background:var(--navy);color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.logo{font-size:16px;font-weight:500;display:flex;align-items:center;gap:8px}
.topbar-right{display:flex;align-items:center;gap:10px;font-size:13px;opacity:.9}
.nav{background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);display:flex;gap:0;overflow-x:auto}
.tab{padding:10px 16px;font-size:13px;color:var(--color-text-secondary);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:500}
.tab:hover{color:var(--blue)}
.page{padding:20px;max-width:900px;margin:0 auto}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:16px 20px;margin-bottom:14px}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.metric{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px;text-align:center}
.metric-val{font-size:24px;font-weight:500;color:var(--blue)}
.metric-lab{font-size:11px;color:var(--color-text-secondary);margin-top:3px}
.sec-title{font-size:12px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
.badge-warn{background:#faeeda;color:#633806}
.badge-ok{background:#eaf3de;color:#27500a}
.badge-danger{background:#fcebeb;color:#791f1f}
.badge-blue{background:#e6f1fb;color:#0c447c}
.tag{display:inline-block;padding:2px 7px;border-radius:8px;font-size:11px;background:#e6f1fb;color:#0c447c;margin:2px}
.row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.row:last-child{border-bottom:none}
.avatar{width:36px;height:36px;border-radius:50%;background:#e6f1fb;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:#0c447c;flex-shrink:0}
.bar-bg{background:var(--color-background-secondary);border-radius:4px;height:6px;overflow:hidden;width:80px}
.bar-fill{height:6px;border-radius:4px}
.ai-box{background:#e6f1fb;border-left:3px solid var(--blue);border-radius:var(--border-radius-md);padding:12px 14px;font-size:13px;line-height:1.6;color:#042c53;margin-bottom:12px}
.ai-box.loading{background:var(--color-background-secondary);border-left-color:var(--color-border-secondary);color:var(--color-text-secondary);font-style:italic}
.btn{padding:7px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);font-size:13px;cursor:pointer}
.btn:hover{background:var(--color-background-secondary)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{background:var(--navy)}
.btn-sm{padding:4px 10px;font-size:12px}
.choice-opt{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);margin-bottom:6px;cursor:pointer;font-size:13px}
.choice-opt:hover{background:var(--color-background-secondary)}
.choice-opt.correct{background:#eaf3de;border-color:#639922;color:#27500a}
.choice-opt.wrong{background:#fcebeb;border-color:#a32d2d;color:#501313}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:8px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:14px;font-family:var(--font-sans)}
.field textarea{min-height:70px;resize:vertical}
.login-wrap{display:flex;flex-direction:column;align-items:center;padding:40px 20px}
.login-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:28px;width:100%;max-width:360px}
.role-pills{display:flex;gap:8px;margin-bottom:14px}
.role-pill{flex:1;padding:8px;text-align:center;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:13px;cursor:pointer}
.role-pill.sel{background:var(--blue);color:#fff;border-color:var(--blue)}
.chat-msg{padding:8px 12px;border-radius:var(--border-radius-md);font-size:13px;line-height:1.6;margin-bottom:8px;max-width:90%}
.chat-user{background:#e6f1fb;color:#042c53;margin-left:auto}
.chat-ai{background:var(--color-background-secondary);color:var(--color-text-primary)}
.chat-input-row{display:flex;gap:8px;margin-top:12px}
.chat-input-row input{flex:1;padding:8px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:13px;font-family:var(--font-sans)}
.prog-bar{background:var(--color-background-secondary);border-radius:4px;height:8px;overflow:hidden;margin-top:4px}
.prog-fill{height:8px;border-radius:4px;background:var(--blue);transition:width .5s}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--color-border-tertiary);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>

<h2 class="sr-only">EduBénin IA — Plateforme éducative intelligente</h2>
<div class="app" id="root"></div>

<script>
const NIVEAUX = ["CP","CE1","CE2","CM1","CM2","6ème","5ème","4ème","3ème","2nde","1ère","Terminale"];

const DB = {
  users:[
    {id:1,nom:"Aïcha Dossou",role:"eleve",classe:"3ème",mdp:"1234",score:72,matieres:{maths:62,francais:79,svt:85,histoire:71},diffs:["Fractions","Équations 1er degré"],exercices:14,progression:8},
    {id:2,nom:"Kofi Agbodji",role:"eleve",classe:"3ème",mdp:"1234",score:45,matieres:{maths:40,francais:38,svt:65,histoire:55},diffs:["Conjugaison subjonctif","Accord participe passé","Dictée"],exercices:9,progression:-2},
    {id:3,nom:"Fatou Zinsou",role:"eleve",classe:"3ème",mdp:"1234",score:88,matieres:{maths:90,francais:85,svt:88,histoire:82},diffs:["Probabilités"],exercices:22,progression:5},
    {id:4,nom:"Marcos Adjovi",role:"eleve",classe:"3ème",mdp:"1234",score:31,matieres:{maths:28,francais:35,svt:42,histoire:30},diffs:["Lecture","Compréhension de texte","Géographie"],exercices:7,progression:3},
    {id:5,nom:"Amara Hounsou",role:"eleve",classe:"CP",mdp:"1234",score:68,matieres:{maths:70,francais:65,svt:72,histoire:60},diffs:["Lecture syllabique"],exercices:8,progression:5},
    {id:6,nom:"Prof. Martin",role:"prof",classe:"3ème",mdp:"prof",classes:["3ème","Terminale"]},
  ],
  exercices:[
    {id:1,matiere:"Mathématiques",titre:"Équations du 1er degré",question:"Si 3x + 6 = 15, quelle est la valeur de x ?",choices:["x = 2","x = 3","x = 7","x = 5"],correct:1,expl:"On soustrait 6 : 3x = 9, puis on divise par 3 : x = 3.",niveau:"moyen"},
    {id:2,matiere:"Français",titre:"Accord du participe passé",question:"Laquelle de ces phrases est correcte ?",choices:["Les fleurs que j'ai cueillie sont belles.","Les fleurs que j'ai cueillies sont belles.","Les fleurs que j'ai cueilli sont belles.","Les fleurs que j'ai cueillis sont belles."],correct:1,expl:"Le participe passé s'accorde avec le COD placé avant (les fleurs = féminin pluriel → cueillies).",niveau:"difficile"},
    {id:3,matiere:"SVT",titre:"La photosynthèse",question:"Quelle molécule est produite par la photosynthèse ?",choices:["CO₂","Eau","Glucose","Azote"],correct:2,expl:"La photosynthèse convertit CO₂ + eau + lumière → glucose + oxygène.",niveau:"facile"},
  ],
  contenusProfesseur:[
    {titre:"Révision équations — exercices niveau 2",matiere:"Maths",dest:"Élèves en difficulté",date:"22 mai",auteur:"Prof. Martin"},
    {titre:"Texte de dictée : La savane africaine",matiere:"Français",dest:"Toute la 3ème",date:"20 mai",auteur:"Prof. Martin"},
  ]
};

const S = {
  screen:"login",
  role:"eleve",
  user:null,
  tab:0,
  exIdx:0,
  chosenAns:null,
  chatMsgs:[],
  chatLoading:false,
  aiSummary:null,
  aiSummaryLoading:false,
  aiExercice:null,
  aiExLoading:false,
  partageSuccess:false,
  showAddEleve:false,
  addEleveSuccess:false,
};

function ini(n){return n.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase()}
function scoreColor(s){return s>=80?"#27ae60":s>=60?"#f39c12":"#e74c3c"}
function niveauBadge(s){
  if(s>=80)return '<span class="badge badge-ok">excellent</span>';
  if(s>=60)return '<span class="badge badge-warn">moyen</span>';
  return '<span class="badge badge-danger">en difficulté</span>';
}

async function callIA(systemPrompt, userMsg){
  const res = await fetch("https://api.edubenin.ai/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"edubenin-ia-1.0",
      max_tokens:1000,
      system: systemPrompt,
      messages:[{role:"user",content:userMsg}]
    })
  });
  const data = await res.json();
  return data.content.map(c=>c.text||"").join("");
}

function render(){
  const root = document.getElementById("root");
  if(S.screen==="login") root.innerHTML = renderLogin();
  else if(S.user?.role==="prof") root.innerHTML = renderProf();
  else root.innerHTML = renderEleve();
  attachAll();
}

function renderLogin(){
  return `<div class="login-wrap">
    <div class="login-card">
      <div style="text-align:center;margin-bottom:18px">
        <div style="width:52px;height:52px;border-radius:50%;background:var(--blue);display:inline-flex;align-items:center;justify-content:center;margin-bottom:8px">
          <i class="ti ti-school" style="font-size:24px;color:#fff" aria-hidden="true"></i>
        </div>
        <div style="font-size:18px;font-weight:500">EduBénin IA</div>
        <div style="font-size:12px;color:var(--color-text-secondary)">Plateforme éducative intelligente</div>
      </div>
      <div class="role-pills">
        <div class="role-pill ${S.role==="eleve"?"sel":""}" id="rp-eleve"><i class="ti ti-user-star" aria-hidden="true"></i> Élève</div>
        <div class="role-pill ${S.role==="prof"?"sel":""}" id="rp-prof"><i class="ti ti-chalkboard" aria-hidden="true"></i> Professeur</div>
      </div>
      <div class="field"><label>Nom complet</label><input id="inp-nom" type="text" placeholder="${S.role==="prof"?"Prof. Martin":"Aïcha Dossou"}" value="${S.role==="prof"?"Prof. Martin":"Aïcha Dossou"}"/></div>
      ${S.role==="eleve"?`<div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:4px;text-align:center">Du CP à la Terminale — tous les niveaux sont les bienvenus 🎒</div>`:""}
      <div class="field"><label>Mot de passe</label><input id="inp-mdp" type="password" placeholder="••••" value="${S.role==="prof"?"prof":"1234"}"/></div>
      <button class="btn btn-primary" id="btn-login" style="width:100%;margin-top:4px">Se connecter</button>
      <div id="login-err" style="color:var(--color-text-danger);font-size:12px;text-align:center;margin-top:8px;display:none">Identifiants incorrects</div>
    </div>
  </div>`;
}

function renderTopbar(label, extra=""){
  return `<div class="topbar">
    <div class="logo"><i class="ti ti-school" aria-hidden="true"></i> EduBénin IA</div>
    <div class="topbar-right">${extra}<i class="ti ti-user" aria-hidden="true"></i> ${label} <button class="btn btn-sm" id="btn-logout" style="color:#fff;border-color:rgba(255,255,255,.3);background:transparent;font-size:12px">Déconnexion</button></div>
  </div>`;
}

// ── ÉLÈVE ─────────────────────────────────────────────────────────────────────
function renderEleve(){
  const u = S.user;
  const tabs=["Mon tableau de bord","Exercices IA","Mon assistant","Mes cours"];
  return renderTopbar(`${u.nom} · ${u.classe}`) +
    `<div class="nav">${tabs.map((t,i)=>`<div class="tab ${S.tab===i?"active":""}" data-tab="${i}">${t}</div>`).join("")}</div>
    <div class="page">${[renderEleveDash,renderEleveEx,renderEleveChat,renderEleveCours][S.tab]()}</div>`;
}

function renderEleveDash(){
  const u = S.user;
  const prog = u.progression >= 0 ? `+${u.progression}%` : `${u.progression}%`;
  const progColor = u.progression >= 0 ? "var(--green)" : "var(--red)";
  return `
  <div class="metrics">
    <div class="metric"><div class="metric-val" style="color:${scoreColor(u.score)}">${u.score}%</div><div class="metric-lab">Score global</div></div>
    <div class="metric"><div class="metric-val" style="color:var(--red)">${u.diffs.length}</div><div class="metric-lab">Difficultés détectées</div></div>
    <div class="metric"><div class="metric-val" style="color:${progColor}">${prog}</div><div class="metric-lab">Cette semaine</div></div>
    <div class="metric"><div class="metric-val">${u.exercices}</div><div class="metric-lab">Exercices faits</div></div>
  </div>
  <div class="card">
    <div class="sec-title">Analyse de mon profil par l'IA</div>
    <div id="ai-dash-box">${S.aiSummary
      ? `<div class="ai-box">${S.aiSummary}</div>`
      : S.aiSummaryLoading
        ? `<div class="ai-box loading"><span class="spinner"></span>L'IA analyse votre profil...</div>`
        : `<div class="ai-box loading">Chargement de l'analyse...</div>`
    }</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-primary btn-sm" data-action="goto-ex">Faire mes exercices</button>
      <button class="btn btn-sm" data-action="goto-chat">Poser une question à l'IA</button>
    </div>
  </div>
  <div class="card">
    <div class="sec-title">Mes matières</div>
    ${Object.entries(u.matieres).map(([m,s])=>`
    <div class="row">
      <div style="flex:1;font-size:14px;text-transform:capitalize">${m==="calcul"?"Calcul & Maths":m==="lecture"?"Lecture":m==="ecriture"?"Écriture":m==="eveil"?"Éveil":m}</div>
      <div style="width:120px">
        <div class="bar-bg"><div class="bar-fill" style="width:${s}%;background:${scoreColor(s)}"></div></div>
      </div>
      <div style="font-size:13px;font-weight:500;color:${scoreColor(s)};width:36px;text-align:right">${s>0?s+"%":"—"}</div>
    </div>`).join("")}
  </div>
  <div class="card">
    <div class="sec-title">Mes difficultés détectées</div>
    ${u.diffs.map(d=>`<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:13px"><i class="ti ti-alert-triangle" style="color:var(--amber)" aria-hidden="true"></i> ${d}</div>`).join("")}
    ${u.diffs.length===0?`<div style="font-size:13px;color:var(--color-text-secondary)">Aucune difficulté détectée. Continue comme ça !</div>`:""}
  </div>
  <div class="card">
    <div class="sec-title">Contenus partagés par mon prof</div>
    ${DB.contenusProfesseur.map(c=>`<div class="row">
      <i class="ti ti-file-text" style="font-size:20px;color:var(--blue)" aria-hidden="true"></i>
      <div style="flex:1"><div style="font-size:14px;font-weight:500">${c.titre}</div><div style="font-size:12px;color:var(--color-text-secondary)">${c.matiere} · ${c.auteur} · ${c.date}</div></div>
      <span class="badge badge-ok">Reçu</span>
    </div>`).join("")}
  </div>`;
}

function renderEleveEx(){
  const u = S.user;
  const ex = DB.exercices[S.exIdx];
  return `
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div><span class="tag">${ex.matiere}</span> <span class="tag">${ex.niveau}</span></div>
      <div style="font-size:12px;color:var(--color-text-secondary)">${S.exIdx+1} / ${DB.exercices.length}</div>
    </div>
    <div class="sec-title">Question</div>
    <div style="font-size:15px;line-height:1.6;margin-bottom:14px;font-weight:500">${ex.question}</div>
    <div id="choices">
      ${ex.choices.map((c,i)=>`<div class="choice-opt ${S.chosenAns===null?"":S.chosenAns===i?(i===ex.correct?"correct":"wrong"):(i===ex.correct?"correct":"")}" data-choice="${i}">
        <span style="font-weight:500;color:var(--blue)">${String.fromCharCode(65+i)}.</span> ${c}
      </div>`).join("")}
    </div>
    ${S.chosenAns!==null?`<div class="ai-box" style="margin-top:12px;margin-bottom:0">
      ${S.chosenAns===ex.correct?`<i class="ti ti-check" aria-hidden="true"></i> <strong>Bonne réponse !</strong>`:
        `<i class="ti ti-x" aria-hidden="true"></i> <strong>Pas tout à fait.</strong>`} ${ex.expl}
    </div>`:""}
  </div>
  ${S.chosenAns!==null?`<div class="card">
    <div class="sec-title">Exercice suivant recommandé par l'IA</div>
    <div id="ai-ex-box">${S.aiExercice
      ? `<div class="ai-box">${S.aiExercice}</div>`
      : S.aiExLoading
        ? `<div class="ai-box loading"><span class="spinner"></span>L'IA prépare votre prochain exercice...</div>`
        : `<div class="ai-box loading">Chargement...</div>`
    }</div>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button class="btn btn-primary btn-sm" data-action="next-ex">Exercice suivant →</button>
    </div>
  </div>`:""}
  <div class="card">
    <div class="sec-title">Mes difficultés à travailler</div>
    ${u.diffs.map(d=>`<span class="tag">${d}</span>`).join("")}
    <div style="margin-top:10px"><button class="btn btn-sm" data-action="goto-chat">Demander une explication à l'IA</button></div>
  </div>`;
}

function renderEleveChat(){
  const u = S.user;
  return `
  <div class="card" style="margin-bottom:0">
    <div class="sec-title">Assistant IA — ${u.nom} · ${u.classe}</div>
    <div id="chat-messages" style="min-height:200px;margin-bottom:4px">
      ${S.chatMsgs.length===0?`<div style="font-size:13px;color:var(--color-text-secondary);padding:8px 0">Bonjour ${u.nom} ! Pose-moi toutes tes questions sur tes cours. Je suis là pour t'aider !</div>`:""}
      ${S.chatMsgs.map(m=>`<div class="chat-msg ${m.role==="user"?"chat-user":"chat-ai"}">${m.content}</div>`).join("")}
      ${S.chatLoading?`<div class="chat-msg chat-ai"><span class="spinner"></span>L'IA réfléchit...</div>`:""}
    </div>
    <div class="chat-input-row">
      <input id="chat-inp" type="text" placeholder="Pose ta question ici... ex: Explique-moi les fractions" ${S.chatLoading?"disabled":""}/>
      <button class="btn btn-primary btn-sm" id="btn-send" ${S.chatLoading?"disabled":""}>Envoyer</button>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:10px">
      ${["Explique les fractions","Qu'est-ce que le subjonctif ?","Comment résoudre une équation ?"].map(q=>`<button class="btn btn-sm" data-quick="${q}">${q}</button>`).join("")}
    </div>
  </div>`;
}

function renderEleveCours(){
  const u = S.user;
  const matieres=[
    {m:"Mathématiques",icone:"ti-calculator",score:u.matieres.maths,chapitres:["Fractions","Équations du 1er degré","Géométrie","Probabilités"]},
    {m:"Français",icone:"ti-book",score:u.matieres.francais,chapitres:["Conjugaison","Grammaire","Orthographe","Rédaction"]},
    {m:"SVT",icone:"ti-leaf",score:u.matieres.svt,chapitres:["Photosynthèse","Corps humain","Écosystèmes"]},
    {m:"Histoire-Géo",icone:"ti-globe",score:u.matieres.histoire,chapitres:["Afrique précoloniale","Colonisation","États modernes"]},
  ];
  return matieres.map(mat=>`
  <div class="card">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
      <i class="ti ${mat.icone}" style="font-size:20px;color:var(--blue)" aria-hidden="true"></i>
      <div style="flex:1"><div style="font-weight:500">${mat.m}</div></div>
      <div style="font-size:13px;font-weight:500;color:${scoreColor(mat.score)}">${mat.score}%</div>
    </div>
    <div class="prog-bar"><div class="prog-fill" style="width:${mat.score}%;background:${scoreColor(mat.score)}"></div></div>
    <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:10px">
      ${mat.chapitres.map(c=>`<span class="tag">${c}</span>`).join("")}
    </div>
    <button class="btn btn-sm" style="margin-top:10px" data-revise="${mat.m}">Réviser avec l'IA</button>
  </div>`).join("");
}

// ── PROF ──────────────────────────────────────────────────────────────────────
function renderProf(){
  const u = S.user;
  const tabs=["Tableau de bord","Élèves & Niveaux","Partager un contenu"];
  return renderTopbar(`${u.nom}`, `<span class="badge badge-blue" style="margin-right:4px">Administrateur</span>`) +
    `<div class="nav">${tabs.map((t,i)=>`<div class="tab ${S.tab===i?"active":""}" data-tab="${i}">${t}</div>`).join("")}</div>
    <div class="page">${[renderProfDash,renderProfDiffs,renderProfShare][S.tab]()}</div>
    ${S.showAddEleve ? renderModalAjoutEleve() : ""}`;

// ── EVENTS ────────────────────────────────────────────────────────────────────
function attachAll(){
  // Login
  document.getElementById("rp-eleve")?.addEventListener("click",()=>{S.role="eleve";render()});
  document.getElementById("rp-prof")?.addEventListener("click",()=>{S.role="prof";render()});
  document.getElementById("btn-login")?.addEventListener("click",()=>{
    const nom = document.getElementById("inp-nom").value.trim();
    const mdp = document.getElementById("inp-mdp").value.trim();
    const found = DB.users.find(u=>u.nom.toLowerCase()===nom.toLowerCase()&&u.mdp===mdp&&u.role===S.role);
    if(found){
      S.user=found; S.screen="app"; S.tab=0; S.chatMsgs=[]; S.aiSummary=null;
      render();
      loadAiSummary();
    } else {
      document.getElementById("login-err").style.display="block";
    }
  });

  // Logout
  document.getElementById("btn-logout")?.addEventListener("click",()=>{
    S.screen="login"; S.user=null; S.tab=0; S.aiSummary=null; S.chatMsgs=[]; S.partageSuccess=false;
    render();
  });

  // Tabs
  document.querySelectorAll("[data-tab]").forEach(el=>{
    el.addEventListener("click",()=>{S.tab=parseInt(el.dataset.tab);S.chosenAns=null;S.aiExercice=null;S.partageSuccess=false;render()});
  });

  // Actions génériques
  document.querySelectorAll("[data-action]").forEach(el=>{
    el.addEventListener("click",()=>{
      const a = el.dataset.action;
      if(a==="goto-ex"){S.tab=1;S.chosenAns=null;render();}
      if(a==="goto-chat"){S.tab=2;render();}
      if(a==="next-ex"){S.exIdx=(S.exIdx+1)%DB.exercices.length;S.chosenAns=null;S.aiExercice=null;render();}
      if(a==="gen-plan") sendPrompt("Génère un plan de cours sur les fractions pour une classe de 3ème avec 30% d'élèves en difficulté");
      if(a==="gen-contenu") generateContenuIA();
    });
  });

  // Choix exercice
  document.querySelectorAll("[data-choice]").forEach(el=>{
    if(S.chosenAns===null){
      el.addEventListener("click",()=>{
        S.chosenAns=parseInt(el.dataset.choice);
        render();
        loadAiExercice();
      });
    }
  });

  // Chat
  const chatInp = document.getElementById("chat-inp");
  document.getElementById("btn-send")?.addEventListener("click",()=>sendChat());
  chatInp?.addEventListener("keydown",e=>{if(e.key==="Enter")sendChat()});
  document.querySelectorAll("[data-quick]").forEach(el=>{
    el.addEventListener("click",()=>{
      if(chatInp) chatInp.value = el.dataset.quick;
      sendChat();
    });
  });

  // Gen exercices prof
  document.querySelectorAll("[data-gen-ex]").forEach(el=>{
    el.addEventListener("click",()=>{
      const [nom,diffs] = el.dataset.genEx.split("|");
      sendPrompt(`Génère 3 exercices personnalisés pour ${nom} (élève de 3ème) sur ses difficultés : ${diffs}`);
    });
  });

  // Reviser
  document.querySelectorAll("[data-revise]").forEach(el=>{
    el.addEventListener("click",()=>{
      S.tab=2; render();
      setTimeout(()=>{
        const inp = document.getElementById("chat-inp");
        if(inp) inp.value = `Explique-moi un chapitre de ${el.dataset.revise} pour la 3ème`;
      },100);
    });
  });

  // Partager
  document.getElementById("btn-share")?.addEventListener("click",()=>{
    const titre = document.getElementById("sh-titre").value.trim();
    const mat = document.getElementById("sh-mat").value;
    const dest = document.getElementById("sh-dest").value;
    if(titre){
      DB.contenusProfesseur.unshift({titre,matiere:mat,dest,date:"Aujourd'hui",auteur:"Prof. Martin"});
    }
    S.partageSuccess=true; render();
  });
}

async function loadAiSummary(){
  S.aiSummaryLoading=true;
  const u = S.user;
  let prompt, system;
  if(u.role==="eleve"){
    system = "Tu es un assistant pédagogique bienveillant pour EduBénin IA. Tu analyses les performances des élèves béninois et tu donnes des conseils encourageants et précis. Réponds toujours en français, de façon chaleureuse et motivante. Sois concis (3-4 phrases max).";
    prompt = `L'élève ${u.nom} (classe de ${u.classe}) a un score global de ${u.score}%. Ses résultats par matière : maths ${u.matieres.maths}%, français ${u.matieres.francais}%, SVT ${u.matieres.svt}%, histoire ${u.matieres.histoire}%. Ses difficultés détectées : ${u.diffs.join(", ")||"aucune"}. Progression cette semaine : ${u.progression>0?"+":""}${u.progression}%. Fais une analyse courte et encourageante de son profil avec 1-2 recommandations concrètes.`;
  } else {
    const eleves = DB.users.filter(u=>u.role==="eleve"&&u.classe==="3ème");
    const allDiffs = eleves.flatMap(e=>e.diffs);
    const freq = {};
    allDiffs.forEach(d=>{freq[d]=(freq[d]||0)+1;});
    const top = Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([d,n])=>`${d} (${n} élèves)`).join(", ");
    system = "Tu es un assistant pédagogique pour les professeurs de EduBénin IA. Tu analyses les données de classe et fournis des recommandations pédagogiques concrètes et actionables. Réponds en français, de façon professionnelle et concise (3-4 phrases max).";
    prompt = `Le Prof. Martin enseigne en 3ème. Il a ${eleves.length} élèves. Score moyen : ${Math.round(eleves.reduce((a,b)=>a+b.score,0)/eleves.length)}%. Élèves en difficulté (score<60%) : ${eleves.filter(e=>e.score<60).length}. Difficultés les plus fréquentes dans la classe : ${top}. Fais un résumé pédagogique de la classe avec 2 recommandations concrètes pour la prochaine séance.`;
  }
  try {
    const res = await callIA(system, prompt);
    S.aiSummary = res;
  } catch(e){
    S.aiSummary = `<i class="ti ti-sparkles" aria-hidden="true"></i> Analyse IA disponible après connexion à l'API.`;
  }
  S.aiSummaryLoading=false;
  const box = document.getElementById(u.role==="prof"?"ai-prof-box":"ai-dash-box");
  if(box) box.innerHTML = `<div class="ai-box">${S.aiSummary}</div>`;
}

async function loadAiExercice(){
  S.aiExLoading=true;
  const u = S.user;
  const ex = DB.exercices[S.exIdx];
  const correct = S.chosenAns === ex.correct;
  try {
    const res = await callIA(
      "Tu es un tuteur pédagogique pour EduBénin IA. Tu guides les élèves béninois de 3ème. Sois encourageant, précis et concis (2-3 phrases). Réponds en français.",
      `L'élève ${u.nom} vient de ${correct?"réussir":"rater"} un exercice sur "${ex.titre}" en ${ex.matiere}. Ses difficultés : ${u.diffs.join(", ")||"aucune particulière"}. Dis-lui quelle notion travailler ensuite et pourquoi, de façon motivante.`
    );
    S.aiExercice = res;
  } catch(e){
    S.aiExercice = "Recommandation disponible après connexion à l'API.";
  }
  S.aiExLoading=false;
  const box = document.getElementById("ai-ex-box");
  if(box) box.innerHTML = `<div class="ai-box">${S.aiExercice}</div>`;
}

async function sendChat(){
  const inp = document.getElementById("chat-inp");
  const msg = inp?.value.trim();
  if(!msg||S.chatLoading) return;
  inp.value="";
  S.chatMsgs.push({role:"user",content:msg});
  S.chatLoading=true;
  render();
  const u = S.user;
  try {
    const res = await callIA(
      `Tu es un assistant pédagogique bienveillant pour EduBénin IA, la plateforme éducative béninoise. Tu aides les élèves de la classe de ${u.classe}. L'élève s'appelle ${u.nom}. Ses difficultés : ${u.diffs.join(", ")||"aucune particulière"}. ${["CP","CE1","CE2"].includes(u.classe)?"Cet élève est en primaire ("+u.classe+"). Utilise des mots très simples, des phrases courtes, beaucoup d'encouragements et des exemples de la vie quotidienne. Évite les explications abstraites.":"Réponds toujours en français, de façon claire, pédagogique et adaptée au niveau "+u.classe+"."} Sois concis et donne des exemples concrets.`,
      msg
    );
    S.chatMsgs.push({role:"ai",content:res});
  } catch(e){
    S.chatMsgs.push({role:"ai",content:"Désolé, une erreur s'est produite. Vérifie ta connexion et réessaie."});
  }
  S.chatLoading=false;
  render();
  const msgs = document.getElementById("chat-messages");
  if(msgs) msgs.scrollTop=msgs.scrollHeight;
}

async function generateContenuIA(){
  const mat = document.getElementById("sh-mat")?.value||"Mathématiques";
  const dest = document.getElementById("sh-dest")?.value||"Toute la 3ème";
  const titre = document.getElementById("sh-titre");
  if(titre) titre.value="Génération en cours...";
  try {
    const res = await callIA(
      "Tu es un assistant pour professeurs sur EduBénin IA. Génère un titre court (max 8 mots) pour un contenu pédagogique. Réponds UNIQUEMENT avec le titre, rien d'autre.",
      `Génère un titre de contenu pédagogique en ${mat} pour ${dest} en classe de 3ème.`
    );
    if(titre) titre.value = res.replace(/["\n]/g,"").trim();
  } catch(e){
    if(titre) titre.value = `Exercices ${mat} — 3ème`;
  }
}

function attachModalEvents(){
  document.getElementById("btn-close-modal")?.addEventListener("click",()=>{S.showAddEleve=false;S.addEleveSuccess=false;render()});
  document.getElementById("btn-cancel-add")?.addEventListener("click",()=>{S.showAddEleve=false;S.addEleveSuccess=false;render()});
  document.getElementById("btn-add-another")?.addEventListener("click",()=>{S.addEleveSuccess=false;render();attachModalEvents()});
  document.getElementById("btn-confirm-add")?.addEventListener("click",()=>{
    const nom = document.getElementById("add-nom")?.value.trim();
    const classe = document.getElementById("add-classe")?.value;
    const mdp = document.getElementById("add-mdp")?.value.trim();
    if(!nom||!mdp){document.getElementById("add-err").style.display="block";return;}
    const newId = Math.max(...DB.users.map(u=>u.id))+1;
    // Adapt matieres labels for CP/primaire
    const isPrimaire = ["CP","CE1","CE2","CM1","CM2"].includes(classe);
    DB.users.push({
      id:newId, nom, role:"eleve", classe, mdp, score:0,
      matieres: isPrimaire
        ? {lecture:0,calcul:0,ecriture:0,eveil:0}
        : {maths:0,francais:0,svt:0,histoire:0},
      diffs:[], exercices:0, progression:0
    });
    S.addEleveSuccess=true;
    render();
    attachModalEvents();
  });
}
